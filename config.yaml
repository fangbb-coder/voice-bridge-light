# Voice Bridge 配置文件

# 基础配置
language: zh
voice: female
wake_word: "hey claw"
auto_voice_reply: true

# 模型路径
asr_model_dir: "models/whisper"
tts_model_dir: "models/piper"

# 临时文件
temp_dir: "temp"
max_temp_files: 100

# TTS 配置
tts:
  # 默认使用中文女声
  language: "zh_CN"  # zh_CN=中文女声, en_US=英文女声, en_US_low=英文轻量版
  # 语速控制 (0.5=慢速, 1.0=正常, 1.5=快速)
  speed: 1.0
  # 音调控制 (0.8=低音, 1.0=正常, 1.2=高音)
  pitch: 1.0

# 回复配置
reply:
  # 语音消息的回复模式
  # - auto: 自动（语音消息用语音回复，文本消息用文本回复）
  # - text_only: 仅文本回复
  # - voice_only: 仅语音回复
  # - text_and_voice: 文本+语音回复
  voice_reply_mode: "auto"

  # 文本消息的回复模式
  # - text_only: 仅文本回复
  # - voice_only: 仅语音回复
  # - text_and_voice: 文本+语音回复
  text_reply_mode: "text_only"

  # 语音消息回复时是否包含识别文本
  include_recognized_text: true

# 适配器配置
adapters:
  telegram:
    enabled: false
    token: "YOUR_BOT_TOKEN"
    webhook_secret: null
    extra: {}

  wecom:
    enabled: false
    token: null
    webhook_secret: "YOUR_WEBHOOK_TOKEN"
    app_id: "YOUR_CORP_ID"
    app_secret: "YOUR_CORP_SECRET"
    extra: {}

  dingtalk:
    enabled: false
    token: null
    webhook_secret: "YOUR_WEBHOOK_SECRET"
    app_id: "YOUR_APP_KEY"
    app_secret: "YOUR_APP_SECRET"
    extra: {}

  feishu:
    enabled: false
    token: null
    webhook_secret: "YOUR_ENCRYPT_KEY"
    app_id: "YOUR_APP_ID"
    app_secret: "YOUR_APP_SECRET"
    extra: {}

  whatsapp:
    enabled: false
    token: "YOUR_ACCESS_TOKEN"
    webhook_secret: "YOUR_APP_SECRET"
    app_id: null
    app_secret: null
    extra:
      phone_number_id: "YOUR_PHONE_NUMBER_ID"

  qq:
    enabled: false
    token: "YOUR_BOT_TOKEN"
    webhook_secret: "YOUR_SECRET"
    app_id: "YOUR_APP_ID"
    app_secret: null
    extra: {}
